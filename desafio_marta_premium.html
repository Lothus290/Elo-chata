<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio Supremo da Marta - Premium</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#000;color:#fff;overflow:hidden}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999}
.loader{width:90px;height:90px;border:8px solid gold;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1920') center/cover}
.container{position:relative;z-index:2;max-width:900px;margin:20px auto;background:rgba(255,255,255,.08);backdrop-filter:blur(15px);padding:30px;border-radius:25px}
h1{text-align:center;color:gold;text-shadow:0 0 10px gold,0 0 25px gold}
.marta{width:180px;height:180px;border-radius:50%;display:block;margin:20px auto;border:5px solid gold;box-shadow:0 0 30px gold}
.tela{display:none}.ativa{display:block}
input,button{width:100%;padding:14px;border-radius:12px;border:none}
button{background:gold;font-weight:bold;cursor:pointer}
.timer{background:#c62828;padding:10px 15px;border-radius:10px}
.topo{display:flex;justify-content:space-between;margin-bottom:15px}
.progresso{height:12px;background:#333;border-radius:10px;overflow:hidden}
.barra{height:100%;width:0;background:gold;transition:all .8s cubic-bezier(.17,.67,.37,1.3)}
.opcao{padding:14px;margin:10px 0;background:rgba(255,255,255,.08);border-radius:12px;cursor:pointer}
.opcao:hover{background:rgba(255,215,0,.2)}
.resultado{text-align:center}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#particles{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="loading"><div class="loader"></div><h2>Carregando...</h2></div>

<audio id="musica"><source src="sons/suspense.mp3"></audio>
<audio id="acerto"><source src="sons/acerto.mp3"></audio>
<audio id="erro"><source src="sons/erro.mp3"></audio>

<div class="container">
<div id="inicio" class="tela ativa">
<h1>🏆 DESAFIO SUPREMO DA MARTA</h1>
<img class="marta" src="marta.jpg" alt="Marta">
<p>Digite seu nome:</p>
<input id="nome" placeholder="Seu nome">
<br><br>
<button onclick="iniciarQuiz()">COMEÇAR</button>
</div>

<div id="quiz" class="tela">
<div class="topo"><h3 id="contador"></h3><div class="timer" id="timer">02:00</div></div>
<div class="progresso"><div class="barra" id="barra"></div></div>
<h2 id="pergunta"></h2>
<div id="opcoes"></div>
</div>

<div id="vitoria" class="tela resultado">
<h1>🏆 LENDA DA MARTA</h1>
<p id="dadosVitoria"></p>
</div>

<div id="derrota" class="tela resultado">
<h1>❌ ELIMINADO</h1>
<p id="dadosDerrota"></p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
setTimeout(()=>loading.style.display='none',2500);

const perguntas=[
{p:"Cidade natal de Marta?",o:["Dois Riachos","Maceió","Arapiraca","Penedo"],c:"Dois Riachos"},
{p:"Estado natal?",o:["Bahia","Alagoas","Sergipe","PE"],c:"Alagoas"},
{p:"País onde mais brilhou?",o:["Suécia","França","Alemanha","Portugal"],c:"Suécia"},
{p:"Quantas vezes melhor do mundo?",o:["4","5","6","7"],c:"6"},
{p:"Número mais usado?",o:["10","9","11","7"],c:"10"},
{p:"Olimpíada de estreia?",o:["Atenas 2004","Sydney 2000","Pequim 2008","Londres 2012"],c:"Atenas 2004"},
{p:"Embaixadora de qual organização?",o:["ONU Mulheres","UNICEF","UNESCO","FIFA"],c:"ONU Mulheres"},
{p:"Nome completo?",o:["Marta Vieira da Silva","Marta Silva Vieira","Marta Alves Vieira","Marta Maria"],c:"Marta Vieira da Silva"},
{p:"Recorde na Copa 2019?",o:["Maior artilheira das Copas","Mais títulos","Mais assistências","Mais finais"],c:"Maior artilheira das Copas"},
{p:"Mudou-se para o Rio com quantos anos?",o:["14","12","16","18"],c:"14"}
];

let atual=0,tempo=120,intervalo;
perguntas.sort(()=>Math.random()-0.5);

function iniciarQuiz(){
 if(localStorage.getItem('marta_jogou')){
   alert('Este dispositivo já participou.');
   return;
 }
 document.getElementById('inicio').classList.remove('ativa');
 document.getElementById('quiz').classList.add('ativa');
 musica.play().catch(()=>{});
 iniciarTimer();
 carregar();
}

function iniciarTimer(){
 intervalo=setInterval(()=>{
 tempo--;
 let m=String(Math.floor(tempo/60)).padStart(2,'0');
 let s=String(tempo%60).padStart(2,'0');
 timer.textContent=m+":"+s;
 if(tempo<30) timer.style.background='#ff0000';
 if(tempo<=0) derrota("Tempo esgotado!");
 },1000);
}

function carregar(){
 contador.textContent=`Pergunta ${atual+1}/10`;
 barra.style.width=(atual*10)+'%';
 pergunta.textContent=perguntas[atual].p;
 let ops=[...perguntas[atual].o].sort(()=>Math.random()-0.5);
 opcoes.innerHTML='';
 ops.forEach(x=>{
 let d=document.createElement('div');
 d.className='opcao';
 d.textContent=x;
 d.onclick=()=>responder(x);
 opcoes.appendChild(d);
 });
}

function responder(r){
 if(r!==perguntas[atual].c){
   erro.play().catch(()=>{});
   document.querySelector('.container').classList.add('shake');
   return derrota('Você chegou à pergunta '+(atual+1));
 }
 acerto.play().catch(()=>{});
 atual++;
 if(atual>=10) return vitoria();
 carregar();
}

function vitoria(){
 clearInterval(intervalo);
 localStorage.setItem('marta_jogou','1');
 quiz.classList.remove('ativa');
 vitoriaDiv=document.getElementById('vitoria');
 vitoriaDiv.classList.add('ativa');
 dadosVitoria.textContent=`${nome.value||'Participante'} acertou 10/10 com ${tempo}s restantes.`;
 confetti({particleCount:250,spread:180});
}

function derrota(msg){
 clearInterval(intervalo);
 localStorage.setItem('marta_jogou','1');
 quiz.classList.remove('ativa');
 document.getElementById('derrota').classList.add('ativa');
 dadosDerrota.textContent=msg;
}

// partículas
const c=document.getElementById('particles'),ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight} rs(); onresize=rs;
let p=[...Array(60)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*3+1}));
(function a(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle='gold';
p.forEach(i=>{ctx.beginPath();ctx.arc(i.x,i.y,i.r,0,7);ctx.fill();i.y-=0.3;if(i.y<0)i.y=innerHeight;});
requestAnimationFrame(a);
})();
</script>
</body>
</html>
